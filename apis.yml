aid: tiendanube
url: https://raw.githubusercontent.com/api-evangelist/tiendanube/refs/heads/main/apis.yml
name: Tiendanube
kind: company
description: Tiendanube (branded Nuvemshop in Brazil) is the leading e-commerce
  platform for small and medium-sized businesses across Latin America. Its REST
  API lets partner applications manage a merchant's store data - products,
  variants, categories, orders, customers, coupons, webhooks, scripts,
  fulfillment orders, and payment/shipping providers - using OAuth 2.0 and a
  per-store authentication token.
