description: >-
  FinOps view of Tiendanube (Nuvemshop) spend from an app partner's and a
  merchant's perspective. The REST API is not directly metered - it is free to
  call for approved partner apps and rate-limited per store. The costs that
  actually accrue are (1) the merchant's monthly storefront subscription plan,
  (2) transaction fees Tiendanube charges on sales (which vary by plan and
  market), and (3) revenue share Tiendanube takes on paid partner apps and
  in-app purchases. There is no per-API-call charge to model, so FinOps here
  centers on subscription, transaction-fee, and app-revenue-share meters rather
  than usage-priced API tokens.
notes: >-
  Subscription prices, transaction-fee percentages, and app revenue-share terms
  are country- and plan-specific and change frequently; verify against the
  regional Tiendanube/Nuvemshop pricing and Partners pages during
  reconciliation.
