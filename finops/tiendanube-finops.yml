meters:
- name: storefront_subscription
  description: Monthly merchant storefront plan fee (Initial / Growth / Scale / Enterprise), priced per market.
  unit: months
  aggregation: sum
  dimensions:
  - store
  - plan
  - country
- name: transaction_fees
  description: Percentage fee Tiendanube charges on sales made through the storefront; rate depends on plan and market.
  unit: currency
  aggregation: sum
  dimensions:
  - store
  - plan
  - country
- name: app_revenue_share
  description: Revenue share Tiendanube takes on paid partner apps and in-app purchases sold via the App Store.
  unit: currency
  aggregation: sum
  dimensions:
  - app
  - store
- name: api_requests
  description: REST API calls consumed per app+store; not billed, tracked only for rate-limit and capacity planning.
  unit: requests
  aggregation: sum
  dimensions:
  - app
  - store
principles:
- name: Visibility
  description: Track storefront subscription invoices and transaction fees per store; monitor API request volume per app+store against the leaky-bucket limit.
- name: Allocation
  description: Map each merchant store and each partner app to its cost center; separate merchant subscription cost from partner app revenue share.
- name: Optimization
  description: Pick the storefront plan whose transaction-fee tier fits sales volume; batch and cache API reads to stay within the free rate limit and avoid 429 retries.
- name: Accountability
  description: Assign owners per store and per app; review subscription, transaction-fee, and revenue-share lines monthly against budget.
