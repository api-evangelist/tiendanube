aid: tiendanube
name: Tiendanube
review:
  question: Does Tiendanube expose a documented public WebSocket API?
  answer: false
  date: '2026-07-01'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    Per API Evangelist scope, WebSocket and HTTP Server-Sent Events (SSE) are
    in-scope for AsyncAPI modeling. Tiendanube's asynchronous surface is
    delivery-only Webhooks (HMAC-signed HTTP POST callbacks to an app-supplied
    URL), not a client-consumable streaming transport. No AsyncAPI document was
    created because there is no WebSocket or SSE endpoint to model; Webhooks are
    represented as a REST-managed subscription resource in the OpenAPI instead.
findings:
  summary: |
    Tiendanube (Nuvemshop) does not publish a documented public WebSocket API.
    The platform exposes a versioned REST (HTTPS) API under
    https://api.tiendanube.com/v1/{store_id} (and the Brazil mirror
    https://api.nuvemshop.com.br/v1/{store_id}) for app partners. Asynchronous
    events are delivered via Webhooks - server-to-app HTTP POST callbacks signed
    with HMAC-SHA256 in the x-linkedstore-hmac-sha256 header - which is an
    outbound push transport, not a bidirectional WebSocket (ws:// or wss://)
    connection. No realtime WebSocket surface is documented for orders,
    products, or any other resource.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.tiendanube.com/v1/{store_id}
      documented: true
    - protocol: Webhook
      scheme: https
      note: Outbound HMAC-SHA256-signed HTTP POST callbacks to an app-configured URL. One-way server-to-app push, not WebSocket.
      documented: true
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented in Tiendanube/Nuvemshop's API documentation as of the review date.
  endpointsConfirmedRest:
    - GET    https://api.tiendanube.com/v1/{store_id}/products
    - POST   https://api.tiendanube.com/v1/{store_id}/products
    - GET    https://api.tiendanube.com/v1/{store_id}/products/{id}
    - PUT    https://api.tiendanube.com/v1/{store_id}/products/{id}
    - DELETE https://api.tiendanube.com/v1/{store_id}/products/{id}
    - GET    https://api.tiendanube.com/v1/{store_id}/products/{product_id}/variants
    - POST   https://api.tiendanube.com/v1/{store_id}/products/{product_id}/variants
    - GET    https://api.tiendanube.com/v1/{store_id}/products/{product_id}/images
    - GET    https://api.tiendanube.com/v1/{store_id}/categories
    - GET    https://api.tiendanube.com/v1/{store_id}/orders
    - GET    https://api.tiendanube.com/v1/{store_id}/orders/{id}
    - POST   https://api.tiendanube.com/v1/{store_id}/orders/{id}/close
    - POST   https://api.tiendanube.com/v1/{store_id}/orders/{id}/cancel
    - GET    https://api.tiendanube.com/v1/{store_id}/customers
    - GET    https://api.tiendanube.com/v1/{store_id}/coupons
    - GET    https://api.tiendanube.com/v1/{store_id}/webhooks
    - POST   https://api.tiendanube.com/v1/{store_id}/webhooks
    - GET    https://api.tiendanube.com/v1/{store_id}/scripts
    - GET    https://api.tiendanube.com/v1/{store_id}/fulfillment-orders
    - GET    https://api.tiendanube.com/v1/{store_id}/payment_providers
    - GET    https://api.tiendanube.com/v1/{store_id}/shipping_carriers
sources:
  - url: https://tiendanube.github.io/api-documentation/
    type: Documentation
    note: API overview lists REST base URL https://api.tiendanube.com/v1/{store_id}; no WebSocket mentioned.
  - url: https://tiendanube.github.io/api-documentation/resources/webhook
    type: Documentation
    note: Asynchronous events are delivered via HMAC-signed HTTP POST webhooks, not WebSocket.
  - url: https://tiendanube.github.io/api-documentation/authentication
    type: Documentation
    note: OAuth 2.0 authorization-code flow; requests carry an Authentication bearer token and a required User-Agent header.
actions:
  asyncapiPath: null
  apisYmlUpdated: false
  reason: |
    No WebSocket or SSE protocol surface exists. Tiendanube's only asynchronous
    mechanism is delivery-only Webhooks, which are modeled as a REST-managed
    subscription resource rather than an AsyncAPI streaming channel. No AsyncAPI
    document was authored and apis.yml was not modified for streaming.
